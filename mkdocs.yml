site_name: litePlay.js
site_url: https://g-ubimus.github.io/litePlay.docs/
repo_url: https://github.com/g-ubimus/litePlay.js
repo_name: g-ubimus/litePlay.js
theme:
  name: material
  features:
    - toc.integrate
    - content.code.copy

  palette:

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: light)"
      scheme: slate
      primary: green
      accent: light green 
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: dark)"
      scheme: default
      primary: green
      accent: light green 
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: pt
          name: Português
          build: true

nav:
  - Home: index.md
  - play(): play.md
  - eventList class: eventList.md
  - instrument(): instruments.md
  - Generators: generators.md

markdown_extensions:
  - toc:
      toc_depth: 2
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
